name: AI Shorts Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install packages
        run: pip install requests

      - name: Run script
        run: python generate_short.py
     - name: Upload script- name: Upload script
        uses: actions/upload-artifact@v4
          with:
          name: shorts-script
          path: short_script.txt
